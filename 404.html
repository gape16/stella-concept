<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable - Stella'Concept</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    :root { --accent: #C0428A; }
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--color-light);
    }
    .error-page__code {
      font-family: var(--font-heading);
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--color-magenta), var(--color-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-page__title {
      font-family: var(--font-heading);
      font-size: clamp(1.5rem, 3vw, 2rem);
      color: var(--color-primary);
      margin-bottom: 1rem;
    }
    .error-page__text {
      color: var(--color-gray);
      max-width: 450px;
      margin: 0 auto 2rem;
      font-size: 1.05rem;
      line-height: 1.7;
    }
    .error-page__actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-page__logo {
      margin-bottom: 2rem;
    }
    .error-page__logo img {
      height: 50px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-page__logo">
        <a href="index.html"><img src="img/logotype_primaire.svg" alt="Stella'Concept"></a>
      </div>
      <div class="error-page__code">404</div>
      <h1 class="error-page__title">Oups, cette page n'existe pas</h1>
      <p class="error-page__text">La page que vous cherchez a peut-être été déplacée ou n'existe plus. Pas d'inquiétude, retrouvez votre chemin !</p>
      <div class="error-page__actions">
        <a href="index.html" class="btn btn--primary">Retour à l'accueil</a>
        <a href="contact.html" class="btn btn--outline">Nous contacter</a>
      </div>
    </div>
  </div>
</body>
</html>
